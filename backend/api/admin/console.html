<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DevBits Admin Console</title>
    <style>
      :root {
        color-scheme: dark;
        --db-bg: #05070a;
        --db-surface: #10141a;
        --db-surface-alt: #0c1016;
        --db-border: #1f2732;
        --db-text: #f0f3f7;
        --db-muted: #94a0af;
        --db-tint: #00f329;
        --db-danger: #ef4444;
      }
      body {
        margin: 0;
        font-family:
          Inter,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        background: var(--db-bg);
        color: var(--db-text);
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }
      .top {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }
      .title {
        font-size: 24px;
        font-weight: 700;
      }
      .muted {
        color: var(--db-muted);
        font-size: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(120px, 1fr));
        gap: 10px;
        margin-bottom: 16px;
      }
      .stat {
        background: var(--db-surface-alt);
        border: 1px solid var(--db-border);
        border-radius: 10px;
        padding: 10px;
      }
      .stat .k {
        color: var(--db-muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .stat .v {
        font-size: 20px;
        font-weight: 700;
        margin-top: 6px;
        color: var(--db-tint);
      }
      .card {
        background: var(--db-surface);
        border: 1px solid var(--db-border);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 14px;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }
      input {
        background: var(--db-surface-alt);
        color: var(--db-text);
        border: 1px solid var(--db-border);
        border-radius: 8px;
        padding: 8px 10px;
        min-width: 240px;
      }
      input:focus {
        outline: 2px solid color-mix(in srgb, var(--db-tint) 35%, transparent);
        border-color: var(--db-tint);
      }
      button {
        background: var(--db-tint);
        color: #0a0d12;
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font-weight: 700;
      }
      button.secondary {
        background: var(--db-surface-alt);
        color: var(--db-text);
        border: 1px solid var(--db-border);
      }
      button.danger {
        background: var(--db-danger);
        color: #fff;
      }
      button:hover {
        filter: brightness(1.05);
      }
      .table-wrap {
        overflow-x: hidden;
        overflow-y: auto;
        border: 1px solid var(--db-border);
        border-radius: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      thead {
        background: var(--db-surface-alt);
      }
      th,
      td {
        padding: 10px 8px;
        border-bottom: 1px solid var(--db-border);
        text-align: left;
        vertical-align: top;
        font-size: 13px;
        white-space: normal;
        word-break: break-word;
        overflow-wrap: anywhere;
      }
      th {
        color: var(--db-muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      td {
        color: var(--db-text);
      }
      tr:hover td {
        background: color-mix(
          in srgb,
          var(--db-surface-alt) 85%,
          var(--db-tint) 15%
        );
      }
      .cell-truncate {
        max-width: none;
        overflow: visible;
        text-overflow: clip;
        white-space: normal;
      }
      td:last-child {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: flex-start;
      }
      td:last-child button {
        flex: 0 1 auto;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .status {
        font-size: 13px;
        color: var(--db-muted);
        margin-top: 4px;
        min-height: 18px;
      }
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: repeat(2, minmax(120px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="top">
        <div>
          <div class="title">DevBits Admin Console</div>
          <div class="muted">
            Moderation panel with ultimate key or delegated admin login.
          </div>
        </div>
        <div class="toolbar">
          <button id="refresh-overview" class="secondary">
            Refresh Overview
          </button>
          <button id="reset-key" class="secondary">Sign Out</button>
        </div>
      </div>
      <div class="status" id="auth-status"></div>

      <div class="grid">
        <div class="stat">
          <div class="k">Users</div>
          <div class="v" id="stat-users">-</div>
        </div>
        <div class="stat">
          <div class="k">Posts</div>
          <div class="v" id="stat-posts">-</div>
        </div>
        <div class="stat">
          <div class="k">Streams</div>
          <div class="v" id="stat-projects">-</div>
        </div>
        <div class="stat">
          <div class="k">Comments</div>
          <div class="v" id="stat-comments">-</div>
        </div>
      </div>
      <div class="status" id="overview-status"></div>

      <section class="card">
        <h2>Users</h2>
        <div class="row">
          <input
            id="user-search"
            placeholder="Search username (blank = list users)"
          />
          <button id="refresh-users">Search</button>
          <button id="clear-search" class="secondary">Clear</button>
        </div>
        <div id="users" class="table-wrap"></div>
      </section>

      <section class="card">
        <h2>Posts (Bytes)</h2>
        <div class="row">
          <input
            id="post-search"
            placeholder="Search post content (blank = list recent)"
          />
          <button id="search-posts">Search</button>
          <button id="clear-post-search" class="secondary">Clear</button>
        </div>
        <div id="posts" class="table-wrap"></div>
        <div id="post-result" class="status"></div>
      </section>

      <section class="card">
        <h2>Projects (Streams)</h2>
        <div class="row">
          <input
            id="project-search"
            placeholder="Search stream name (blank = list recent)"
          />
          <button id="search-projects">Search</button>
          <button id="clear-project-search" class="secondary">Clear</button>
        </div>
        <div id="projects" class="table-wrap"></div>
        <div id="project-result" class="status"></div>
      </section>

      <section class="card">
        <h2>Comments</h2>
        <div class="row">
          <input
            id="comment-search"
            placeholder="Search comment text (blank = list recent)"
          />
          <button id="search-comments">Search</button>
          <button id="clear-comment-search" class="secondary">Clear</button>
        </div>
        <div id="comments" class="table-wrap"></div>
        <div id="comment-result" class="status"></div>
      </section>
    </div>

    <script src="/admin/static/admin.js"></script>
  </body>
</html>
